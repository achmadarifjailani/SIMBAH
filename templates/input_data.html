{% extends "base.html" %}
{% block content %}
<div class="container my-5">
    <h2 class="text-simbah mb-4 text-center">Input Transaksi Multi-Sampah</h2>
    <div class="card shadow p-4 mx-auto" style="max-width: 800px;">
        <form method="POST" id="formInput">
            <div class="row mb-4 border-bottom pb-3">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Nama Orang</label>
                    <input type="text" class="form-control" name="nama" required placeholder="Contoh: Pak Agus">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Waktu</label>
                    <input type="time" class="form-control" name="waktu" required>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Metode Pembayaran</label>
                    <select class="form-select" name="metode_bayar" required>
                        <option value="Tunai">Tunai (Cash)</option>
                        <option value="Transfer Bank">Transfer Bank (BCA/Mandiri/BRI)</option>
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="Gopay">Gopay</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">No. Rekening / HP Nasabah</label>
                    <input type="text" class="form-control" name="nomor_pembayaran" placeholder="Kosongkan jika tunai">
                </div>
            </div>

            <div id="itemContainer">
                <label class="form-label fw-bold text-success">Daftar Sampah</label>
                <div class="row g-2 mb-2 item-row">
                    <div class="col-md-5">
                        <input type="text" class="form-control" name="barang[]" placeholder="Nama Barang (Botol Plastik)" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" step="0.01" class="form-control" name="berat[]" placeholder="Berat (Kg)" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" class="form-control" name="harga[]" placeholder="Harga/Kg (Rp)" required>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-outline-danger w-100" onclick="removeRow(this)"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-outline-success btn-sm mt-2 mb-4" onclick="addRow()">
                <i class="fas fa-plus"></i> Tambah Jenis Sampah Lainnya
            </button>

            <div class="row border-top pt-3">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Hari</label>
                    <select class="form-select" name="hari">
                        <option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Tgl</label>
                    <input type="number" min="1" max="31" class="form-control" name="tanggal" value="1">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Bulan</label>
                    <select class="form-select" name="bulan">
                        <option>Januari</option><option>Februari</option><option>Maret</option>
                        <option>April</option><option>Mei</option><option>Juni</option>
                        <option>Juli</option><option>Agustus</option><option>September</option>
                        <option>Oktober</option><option>November</option><option>Desember</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Tahun</label>
                    <input type="number" class="form-control" name="tahun" value="2026">
                </div>
            </div>

            <button type="submit" class="btn btn-simbah w-100 py-3 mt-3 shadow">Simpan Semua Transaksi</button>
        </form>
    </div>
</div>

<script>
function addRow() {
    const container = document.getElementById('itemContainer');
    const newRow = document.createElement('div');
    newRow.className = 'row g-2 mb-2 item-row animate__animated animate__fadeIn';
    newRow.innerHTML = `
        <div class="col-md-5">
            <input type="text" class="form-control" name="barang[]" placeholder="Nama Barang" required>
        </div>
        <div class="col-md-2">
            <input type="number" step="0.01" class="form-control" name="berat[]" placeholder="Berat" required>
        </div>
        <div class="col-md-4">
            <input type="number" class="form-control" name="harga[]" placeholder="Harga/Kg" required>
        </div>
        <div class="col-md-1">
            <button type="button" class="btn btn-outline-danger w-100" onclick="removeRow(this)"><i class="fas fa-times"></i></button>
        </div>
    `;
    container.appendChild(newRow);
}

function removeRow(btn) {
    const rows = document.getElementsByClassName('item-row');
    if (rows.length > 1) {
        btn.closest('.item-row').remove();
    } else {
        alert("Minimal harus ada satu jenis barang!");
    }
}
</script>
{% endblock %}
